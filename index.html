<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adiosection — Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <div class="logo-wrap">
    <img src="assets/logo.png" alt="Adiosection logo">
  </div>

  <h1 class="title">ATTENDANCE</h1>
  <p class="subtitle">
    Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor
    incididunt ut labore et dolore magna aliqua.
  </p>

  <!--
    TEMPLATE NOTE:
    To mark a future day as completed, just add class="completed" to that
    .card and swap its inner markup for the "completed" block below
    (star icon + WELL DONE label) — see Day 1 as the reference example.
  -->

  <div class="grid" id="cardGrid">

    <!-- DAY 1 — completed -->
    <div class="card bg-blue completed" data-day="1">
      <img class="star" src="assets/star.png" alt="" onerror="this.style.display='none'">
      <div class="done-label">WELL<br>DONE!</div>
    </div>

    <!-- DAY 2 -->
    <div class="card bg-yellow" data-day="2" onclick="goToDay(2)">
      <img class="icon" src="assets/icon1.png" alt="Day 2 icon">
      <div class="day-label">DAY 2</div>
    </div>

    <!-- DAY 3 -->
    <div class="card bg-blue" data-day="3" onclick="goToDay(3)">
      <img class="icon" src="assets/icon2.png" alt="Day 3 icon">
      <div class="day-label">DAY 3</div>
    </div>

    <!-- DAY 4 -->
    <div class="card bg-yellow" data-day="4" onclick="goToDay(4)">
      <img class="icon" src="assets/icon3.png" alt="Day 4 icon">
      <div class="day-label">DAY 4</div>
    </div>

    <!-- DAY 5 -->
    <div class="card bg-blue" data-day="5" onclick="goToDay(5)">
      <img class="icon" src="assets/icon4.png" alt="Day 5 icon">
      <div class="day-label">DAY 5</div>
    </div>

    <!-- DAY 6 -->
    <div class="card bg-yellow" data-day="6" onclick="goToDay(6)">
      <img class="icon" src="assets/icon5.png" alt="Day 6 icon">
      <div class="day-label">DAY 6</div>
    </div>

  </div>

  <div class="footer-pill-wrap">
    <div class="footer-pill"><b>Adiosection;</b> Attendance.</div>
  </div>

</div>

<!-- OOPS popup (days that aren't unlocked yet) -->
<div class="modal-backdrop" id="oopsModal">
  <div class="modal-box">
    <img src="assets/icon4.png" alt="">
    <p>Oops, you haven't reached this point yet.</p>
    <button onclick="closeOops()">OK</button>
  </div>
</div>

<script>
  function goToDay(day){
    if(day === 2){
      window.location.href = "game.html";
      return;
    }
    // Days 3–6 are locked until unlocked via the same "completed" template as Day 1
    document.getElementById('oopsModal').classList.add('open');
  }

  function closeOops(){
    document.getElementById('oopsModal').classList.remove('open');
  }
</script>

</body>
</html>
